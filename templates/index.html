<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Guard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ──────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070a13;--bg2:#0b0f1a;--surface:#0f1422;--surface2:#161c2c;--surface3:#1d2640;
  --border:#1f2940;--border2:#2c3856;--border-glow:rgba(99,102,241,.25);
  --text:#e6ebf5;--text2:#9ba8c4;--text3:#5c6885;
  --accent:#6366f1;--accent2:#4f46e5;--accent3:#818cf8;--accent-glow:rgba(99,102,241,.35);
  --cyan:#22d3ee;--purple:#a855f7;--pink:#ec4899;
  --critical:#ef4444;--high:#fb923c;--medium:#fbbf24;--low:#60a5fa;--info:#94a3b8;
  --green:#10b981;--green2:#059669;--green-glow:rgba(16,185,129,.3);
  --red:#ef4444;--red-glow:rgba(239,68,68,.3);
  --radius:10px;--radius2:16px;--radius3:24px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.3);
  --shadow:0 8px 32px rgba(0,0,0,.4),0 2px 8px rgba(0,0,0,.3);
  --shadow-lg:0 20px 60px rgba(0,0,0,.5),0 8px 16px rgba(0,0,0,.3);
  --glow-blue:0 0 0 3px rgba(99,102,241,.15),0 4px 20px rgba(99,102,241,.25);
  --glow-green:0 0 0 3px rgba(16,185,129,.15),0 4px 20px rgba(16,185,129,.25);
  --glow-red:0 0 0 3px rgba(239,68,68,.15),0 4px 20px rgba(239,68,68,.25);
  --grad-primary:linear-gradient(135deg,#6366f1 0%,#a855f7 100%);
  --grad-success:linear-gradient(135deg,#10b981 0%,#22d3ee 100%);
  --grad-danger:linear-gradient(135deg,#ef4444 0%,#ec4899 100%);
  --grad-warm:linear-gradient(135deg,#fbbf24 0%,#fb923c 50%,#ef4444 100%);
}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;
  font-feature-settings:'cv11','ss01','ss03';-webkit-font-smoothing:antialiased;
  letter-spacing:-.005em;
}
/* Animated background — radial glows + grid */
body::before{
  content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:
    radial-gradient(ellipse 800px 600px at 15% 0%,rgba(99,102,241,.10),transparent 60%),
    radial-gradient(ellipse 700px 500px at 85% 10%,rgba(168,85,247,.08),transparent 60%),
    radial-gradient(ellipse 900px 600px at 50% 100%,rgba(34,211,238,.06),transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.4;
  background-image:
    linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,#000 40%,transparent 100%);
}
a{color:var(--accent3);text-decoration:none}
button{cursor:pointer;font-family:inherit}
::selection{background:rgba(99,102,241,.3);color:#fff}

/* ── Scrollbar ────────────────────────────────────── */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--border2),var(--border));border-radius:4px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,var(--accent),var(--accent2));background-clip:padding-box}

/* ── Layout ───────────────────────────────────────── */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{
  background:rgba(15,20,34,.7);border-bottom:1px solid var(--border);
  padding:.85rem 2rem;display:flex;align-items:center;gap:1rem;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
}
.topbar .logo{display:flex;align-items:center;gap:.7rem;font-weight:700;font-size:1.2rem;letter-spacing:-.02em;color:var(--text)}
.topbar .logo .logo-mark{
  width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:var(--grad-primary);box-shadow:0 4px 16px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.2);
  position:relative;
}
.topbar .logo .logo-mark svg{width:20px;height:20px;color:#fff}
.topbar .logo-text{background:linear-gradient(135deg,#fff 0%,#a5b4fc 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.topbar .version{
  font-size:.68rem;color:var(--accent3);background:rgba(99,102,241,.1);
  padding:3px 10px;border-radius:20px;border:1px solid rgba(99,102,241,.2);
  font-weight:600;letter-spacing:.05em;
}
.topbar .spacer{flex:1}
.topbar .status-pill{
  display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--text2);
  padding:.3rem .7rem;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);
  border-radius:20px;font-weight:500;
}
.topbar .status-pill .led{
  width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse-led 2s ease-in-out infinite;
}
@keyframes pulse-led{50%{opacity:.4}}

.main{flex:1;padding:2rem 2rem 4rem;max-width:1400px;width:100%;margin:0 auto}

/* ── Scan Form ────────────────────────────────────── */
.scan-form{
  background:linear-gradient(180deg,rgba(22,28,44,.85) 0%,rgba(15,20,34,.85) 100%);
  border:1px solid var(--border);border-radius:var(--radius2);
  padding:1.75rem;margin-bottom:1.5rem;box-shadow:var(--shadow);
  position:relative;overflow:hidden;backdrop-filter:blur(12px);
}
.scan-form::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,.5),transparent);
}
.scan-form h2{font-size:1.05rem;margin-bottom:1.1rem;display:flex;align-items:center;gap:.5rem;font-weight:700;letter-spacing:-.01em}
.input-row{display:flex;gap:.6rem;margin-bottom:1rem}
.input-row input[type=text]{
  flex:1;background:rgba(7,10,19,.6);border:1px solid var(--border);border-radius:var(--radius);
  padding:.85rem 1.1rem;color:var(--text);font-size:.95rem;font-family:inherit;
  transition:all .2s ease;letter-spacing:-.005em;
}
.input-row input::placeholder{color:var(--text3)}
.input-row input:focus{outline:none;border-color:var(--accent);box-shadow:var(--glow-blue);background:rgba(7,10,19,.85)}
.btn{
  padding:.85rem 1.6rem;border-radius:var(--radius);border:none;font-weight:600;
  font-size:.9rem;transition:all .2s ease;display:inline-flex;align-items:center;gap:.5rem;
  font-family:inherit;letter-spacing:-.01em;position:relative;overflow:hidden;
}
.btn-primary{
  background:var(--grad-primary);color:#fff;
  box-shadow:0 4px 16px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.15);
}
.btn-primary::after{
  content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent 50%);
  opacity:0;transition:opacity .2s;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,.2)}
.btn-primary:hover::after{opacity:1}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text3);color:var(--text)}

.scanner-toggles{display:flex;flex-wrap:wrap;gap:.45rem}
.scanner-toggle{
  display:flex;align-items:center;gap:.45rem;padding:.45rem .85rem;
  background:rgba(7,10,19,.5);border:1px solid var(--border);border-radius:20px;
  font-size:.78rem;color:var(--text2);cursor:pointer;transition:all .18s ease;user-select:none;
  font-weight:500;
}
.scanner-toggle:hover{border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
.scanner-toggle.active{
  background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(168,85,247,.1));
  border-color:rgba(99,102,241,.4);color:var(--accent3);
  box-shadow:0 2px 8px rgba(99,102,241,.15);
}
.scanner-toggle .dot{width:6px;height:6px;border-radius:50%;background:var(--border2);transition:all .2s}
.scanner-toggle.active .dot{background:var(--accent3);box-shadow:0 0 6px var(--accent3)}

/* ── Progress ─────────────────────────────────────── */
.progress-section{
  background:linear-gradient(180deg,rgba(22,28,44,.85),rgba(15,20,34,.85));
  border:1px solid var(--border);border-radius:var(--radius2);
  padding:1.5rem;margin-bottom:1.5rem;display:none;backdrop-filter:blur(12px);
  position:relative;overflow:hidden;
}
.progress-section::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,.04),transparent);
  background-size:200% 100%;animation:shimmer 2s linear infinite;pointer-events:none;
}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.progress-section.visible{display:block}
.progress-bar-track{
  width:100%;height:10px;background:rgba(7,10,19,.6);border-radius:5px;overflow:hidden;
  margin:.85rem 0;border:1px solid var(--border);position:relative;
}
.progress-bar-fill{
  height:100%;background:var(--grad-primary);border-radius:5px;transition:width .4s ease;width:0;
  position:relative;box-shadow:0 0 12px var(--accent-glow);
}
.progress-bar-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  background-size:50px 100%;animation:shimmer-bar 1.2s linear infinite;
}
@keyframes shimmer-bar{from{background-position:-50px 0}to{background-position:calc(100% + 50px) 0}}
.progress-label{font-size:.85rem;color:var(--text2);display:flex;justify-content:space-between;font-weight:500}
.progress-label #progressPct{color:var(--accent3);font-weight:700;font-variant-numeric:tabular-nums}

/* ── Dashboard ────────────────────────────────────── */
.dashboard{display:none}
.dashboard.visible{display:block}

/* Score Card */
.score-card{
  background:linear-gradient(180deg,rgba(22,28,44,.85),rgba(15,20,34,.9));
  border:1px solid var(--border);border-radius:var(--radius2);
  padding:2.25rem 2rem;text-align:center;margin-bottom:1.5rem;position:relative;overflow:hidden;
  backdrop-filter:blur(12px);box-shadow:var(--shadow);
}
.score-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,.5),transparent);
}
.score-card::after{
  content:'';position:absolute;top:-50%;left:50%;transform:translateX(-50%);
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);
  pointer-events:none;opacity:.6;
}
.score-ring{width:180px;height:180px;margin:0 auto 1.25rem;position:relative;z-index:1}
.score-ring svg{transform:rotate(-90deg);filter:drop-shadow(0 4px 16px rgba(99,102,241,.3))}
.score-ring .ring-bg{fill:none;stroke:rgba(31,41,64,.5);stroke-width:10}
.score-ring .ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1.8s cubic-bezier(.4,.0,.2,1),stroke .5s}
.score-ring .score-text{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:3rem;font-weight:800;letter-spacing:-.04em;line-height:1;
  font-variant-numeric:tabular-nums;
}
.score-ring .score-grade{
  position:absolute;top:50%;left:50%;transform:translate(-50%,90%);
  font-size:.78rem;color:var(--text2);text-transform:uppercase;letter-spacing:.15em;font-weight:600;
}
.score-meta{
  display:flex;justify-content:center;gap:1.5rem;margin-top:1.25rem;font-size:.82rem;
  color:var(--text2);flex-wrap:wrap;position:relative;z-index:1;
}
.score-meta>span{display:inline-flex;align-items:center;gap:.4rem}

/* Severity Cards */
.severity-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.85rem;margin-bottom:1.5rem}
.sev-card{
  background:linear-gradient(180deg,rgba(22,28,44,.85),rgba(15,20,34,.85));
  border:1px solid var(--border);border-radius:var(--radius2);
  padding:1.1rem .8rem;text-align:center;position:relative;overflow:hidden;
  transition:all .25s ease;cursor:default;backdrop-filter:blur(8px);
}
.sev-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius2) var(--radius2) 0 0}
.sev-card::after{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;opacity:0;
  background:radial-gradient(ellipse at top,currentColor,transparent 70%);
  transition:opacity .3s;pointer-events:none;
}
.sev-card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:var(--shadow-sm)}
.sev-card:hover::after{opacity:.06}
.sev-card.sev-critical{color:var(--critical)}
.sev-card.sev-high{color:var(--high)}
.sev-card.sev-medium{color:var(--medium)}
.sev-card.sev-low{color:var(--low)}
.sev-card.sev-info{color:var(--info)}
.sev-card.sev-critical::before{background:linear-gradient(90deg,var(--critical),#f87171)}
.sev-card.sev-high::before{background:linear-gradient(90deg,var(--high),#fdba74)}
.sev-card.sev-medium::before{background:linear-gradient(90deg,var(--medium),#fde68a)}
.sev-card.sev-low::before{background:linear-gradient(90deg,var(--low),#93c5fd)}
.sev-card.sev-info::before{background:linear-gradient(90deg,var(--info),#cbd5e1)}
.sev-card .count{font-size:2rem;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1}
.sev-card .label{font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-top:.45rem;font-weight:700}

/* Two Column Layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}

/* Panels */
.panel{
  background:linear-gradient(180deg,rgba(22,28,44,.85),rgba(15,20,34,.85));
  border:1px solid var(--border);border-radius:var(--radius2);
  padding:1.4rem;backdrop-filter:blur(8px);box-shadow:var(--shadow-sm);
  transition:border-color .2s;
}
.panel:hover{border-color:var(--border2)}
.panel h3{font-size:.92rem;margin-bottom:1.1rem;display:flex;align-items:center;gap:.55rem;color:var(--text);font-weight:700;letter-spacing:-.01em}
.panel h3 .icon{
  width:28px;height:28px;border-radius:8px;background:rgba(99,102,241,.12);
  display:inline-flex;align-items:center;justify-content:center;font-size:.95rem;
}

/* Category Chart */
.cat-bar{display:flex;align-items:center;gap:.85rem;padding:.55rem 0;border-bottom:1px solid var(--border)}
.cat-bar:last-child{border:none}
.cat-bar .cat-name{flex:1;font-size:.8rem;color:var(--text2);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.cat-bar .cat-track{width:140px;height:8px;background:rgba(7,10,19,.6);border-radius:4px;overflow:hidden;flex-shrink:0;border:1px solid var(--border)}
.cat-bar .cat-fill{height:100%;border-radius:4px;background:var(--grad-primary);box-shadow:0 0 8px rgba(99,102,241,.3);transition:width .8s cubic-bezier(.4,0,.2,1)}
.cat-bar .cat-count{width:30px;text-align:right;font-size:.85rem;font-weight:700;color:var(--text);flex-shrink:0;font-variant-numeric:tabular-nums}

/* Scanner Cards */
.scanner-card{
  display:flex;align-items:center;gap:.85rem;padding:.7rem 0;border-bottom:1px solid var(--border);
}
.scanner-card:last-child{border:none}
.scanner-icon{
  width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:.95rem;flex-shrink:0;font-weight:700;
}
.scanner-icon.clean{
  background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(34,211,238,.12));
  color:var(--green);border:1px solid rgba(16,185,129,.25);
  box-shadow:0 0 12px rgba(16,185,129,.15);
}
.scanner-icon.warn{
  background:linear-gradient(135deg,rgba(251,146,60,.18),rgba(239,68,68,.12));
  color:var(--high);border:1px solid rgba(251,146,60,.25);
  box-shadow:0 0 12px rgba(251,146,60,.15);
}
.scanner-info{flex:1;min-width:0}
.scanner-info .sname{font-size:.88rem;font-weight:600;letter-spacing:-.01em}
.scanner-info .sdesc{font-size:.72rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.1rem}
.scanner-stats{text-align:right;flex-shrink:0}
.scanner-stats .scount{font-size:1rem;font-weight:800;font-variant-numeric:tabular-nums}
.scanner-stats .stime{font-size:.7rem;color:var(--text3);font-variant-numeric:tabular-nums}

/* Roadmap */
.roadmap{
  background:linear-gradient(180deg,rgba(22,28,44,.85),rgba(15,20,34,.85));
  border:1px solid var(--border);border-radius:var(--radius2);
  padding:1.4rem;margin-bottom:1.5rem;backdrop-filter:blur(8px);box-shadow:var(--shadow-sm);
}
.roadmap h3{font-size:.95rem;margin-bottom:1.1rem;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:.5rem}
.roadmap-step{display:flex;gap:1rem;padding:.85rem 0;border-bottom:1px solid var(--border);align-items:flex-start}
.roadmap-step:last-child{border:none;padding-bottom:0}
.roadmap-step:first-child{padding-top:0}
.step-circle{
  width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:.8rem;font-weight:800;color:#fff;flex-shrink:0;
  box-shadow:0 4px 12px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.2);
}
.step-circle.crit{background:linear-gradient(135deg,#ef4444,#dc2626)}
.step-circle.high{background:linear-gradient(135deg,#fb923c,#ea580c)}
.step-circle.med{background:linear-gradient(135deg,#fbbf24,#d97706)}
.step-circle.ok{background:linear-gradient(135deg,#10b981,#059669)}
.step-content{flex:1;padding-top:.15rem}
.step-content strong{font-size:.92rem;font-weight:700;letter-spacing:-.01em;color:var(--text)}
.step-content p{font-size:.8rem;color:var(--text2);margin-top:.3rem;line-height:1.55}

/* ── Findings Table ───────────────────────────────── */
.findings-section{
  background:linear-gradient(180deg,rgba(22,28,44,.85),rgba(15,20,34,.85));
  border:1px solid var(--border);border-radius:var(--radius2);
  padding:1.4rem;backdrop-filter:blur(8px);box-shadow:var(--shadow-sm);
}
.findings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;flex-wrap:wrap;gap:.75rem}
.findings-header h3{font-size:.95rem;font-weight:700;letter-spacing:-.01em}

.filters{display:flex;gap:.4rem;flex-wrap:wrap}
.filter-btn{
  padding:.4rem .85rem;font-size:.74rem;border-radius:20px;border:1px solid var(--border);
  background:rgba(7,10,19,.4);color:var(--text2);transition:all .18s ease;font-weight:600;
  letter-spacing:.02em;font-family:inherit;
}
.filter-btn:hover{border-color:var(--border2);color:var(--text);transform:translateY(-1px)}
.filter-btn.active{
  background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(168,85,247,.12));
  border-color:rgba(99,102,241,.4);color:var(--accent3);
  box-shadow:0 2px 8px rgba(99,102,241,.2);
}
.filter-btn .fcount{margin-left:.35rem;opacity:.7;font-variant-numeric:tabular-nums}

.search-input{
  background:rgba(7,10,19,.6);border:1px solid var(--border);border-radius:var(--radius);
  padding:.5rem .85rem;color:var(--text);font-size:.85rem;width:240px;font-family:inherit;
  transition:all .2s;
}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:var(--glow-blue);background:rgba(7,10,19,.85)}

.finding-list{max-height:70vh;overflow-y:auto;padding-right:.25rem}

.finding-item{
  border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.55rem;
  overflow:hidden;transition:all .2s ease;background:rgba(7,10,19,.3);
}
.finding-item:hover{border-color:var(--border2);background:rgba(7,10,19,.45)}
.finding-item.open{border-color:rgba(99,102,241,.3);background:rgba(7,10,19,.6);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.finding-item-header{
  display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;cursor:pointer;
  transition:background .15s;
}
.finding-item-header:hover{background:rgba(255,255,255,.02)}
.sev-badge{
  padding:.2rem .6rem;border-radius:6px;font-size:.65rem;font-weight:800;
  text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;min-width:68px;text-align:center;
  font-family:'JetBrains Mono','Cascadia Code',monospace;
}
.sev-badge.b-critical{background:rgba(239,68,68,.15);color:var(--critical);border:1px solid rgba(239,68,68,.35);box-shadow:0 0 12px rgba(239,68,68,.15)}
.sev-badge.b-high{background:rgba(251,146,60,.15);color:var(--high);border:1px solid rgba(251,146,60,.35);box-shadow:0 0 12px rgba(251,146,60,.12)}
.sev-badge.b-medium{background:rgba(251,191,36,.15);color:var(--medium);border:1px solid rgba(251,191,36,.35)}
.sev-badge.b-low{background:rgba(96,165,250,.15);color:var(--low);border:1px solid rgba(96,165,250,.35)}
.sev-badge.b-info{background:rgba(148,163,184,.15);color:var(--info);border:1px solid rgba(148,163,184,.3)}
.finding-title{font-size:.88rem;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.005em}
.finding-file{font-size:.74rem;color:var(--text3);font-family:'JetBrains Mono','Cascadia Code',monospace;flex-shrink:0;max-width:280px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chevron{color:var(--text3);transition:transform .25s ease;font-size:.7rem;flex-shrink:0}
.finding-item.open .chevron{transform:rotate(90deg);color:var(--accent3)}

.finding-body{display:none;padding:0 1.1rem 1.1rem;border-top:1px solid var(--border)}

.f-section{margin-top:.85rem}
.f-section-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:.4rem;font-weight:700}
.f-code{
  background:rgba(7,10,19,.7);padding:.7rem .9rem;border-radius:8px;

.f-attack{

}
.f-root-cause{

.f-rec{

/* ── Responsive ───────────────────────────────────── */
@media(max-width:900px){
  .severity-grid{grid-template-columns:repeat(3,1fr)}
  .two-col{grid-template-columns:1fr}
  .main{padding:1rem}
  .topbar{padding:.75rem 1rem}
}
@media(max-width:600px){
  .severity-grid{grid-template-columns:repeat(2,1fr)}
  .input-row{flex-direction:column}
  .finding-file{display:none}
}

/* ── Scan Mode Tabs ───────────────────────────────── */
.mode-tabs{
  display:flex;gap:.3rem;margin-bottom:1.1rem;background:rgba(7,10,19,.5);
  border:1px solid var(--border);border-radius:12px;padding:.3rem;width:fit-content;
}
.mode-tab{
  padding:.55rem 1rem;border-radius:8px;border:none;
  background:transparent;color:var(--text2);font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .2s ease;display:flex;align-items:center;gap:.45rem;
  font-family:inherit;letter-spacing:-.005em;
}
.mode-tab:hover{color:var(--text)}
.mode-tab.active{background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(99,102,241,.1));color:var(--accent3);box-shadow:0 2px 8px rgba(99,102,241,.15),inset 0 1px 0 rgba(255,255,255,.05)}
.mode-tab.active-github{background:linear-gradient(135deg,rgba(168,85,247,.2),rgba(168,85,247,.1));color:#c4b5fd;box-shadow:0 2px 8px rgba(168,85,247,.15),inset 0 1px 0 rgba(255,255,255,.05)}
.mode-tab.active-web{background:linear-gradient(135deg,rgba(16,185,129,.2),rgba(16,185,129,.1));color:#6ee7b7;box-shadow:0 2px 8px rgba(16,185,129,.15),inset 0 1px 0 rgba(255,255,255,.05)}

/* Token field */
.token-row{display:flex;gap:.75rem;margin-bottom:.85rem;align-items:center;animation:fadeIn .3s ease}
.token-row input[type=password]{
  flex:1;background:rgba(7,10,19,.6);border:1px solid var(--border);border-radius:var(--radius);
  padding:.65rem 1rem;color:var(--text);font-size:.85rem;transition:all .2s;
  font-family:'JetBrains Mono','Cascadia Code',monospace;letter-spacing:.05em;
}
.token-row input::placeholder{color:var(--text3);letter-spacing:0}
.token-row input:focus{outline:none;border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.18),0 4px 16px rgba(168,85,247,.2);background:rgba(7,10,19,.85)}
.token-label{font-size:.78rem;color:var(--text2);white-space:nowrap;display:flex;align-items:center;gap:.35rem;font-weight:500}

/* Scan type badge in results */
.scan-type-badge{
  display:inline-flex;align-items:center;gap:.3rem;
  padding:.25rem .65rem;border-radius:20px;font-size:.7rem;font-weight:700;

}
.badge-local{background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(99,102,241,.08));color:var(--accent3);border:1px solid rgba(99,102,241,.3)}

/* ── PDF Download Bar ─────────────────────────────── */
.pdf-bar{
  background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(34,211,238,.05));

}

.pdf-bar.visible{display:flex}

}
.lang-btn.active{background:var(--grad-primary);color:#fff;box-shadow:0 2px 8px var(--accent-glow)}
.lang-btn:hover:not(.active){background:rgba(255,255,255,.04);color:var(--text)}
.btn-pdf{

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}

/* ── Animations ───────────────────────────────────── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .5s cubic-bezier(.4,0,.2,1) forwards}

.pulse{animation:pulse 1.5s ease infinite}

/* ── Toast / Banner (inline alerts) ───────────────── */
.alert-banner{
  display:none;align-items:flex-start;gap:.85rem;padding:.95rem 1.1rem;
  background:linear-gradient(135deg,rgba(251,146,60,.12),rgba(239,68,68,.08));
  border:1px solid rgba(251,146,60,.3);border-radius:var(--radius2);
  margin-bottom:1rem;backdrop-filter:blur(8px);font-size:.85rem;color:var(--text);
  box-shadow:0 4px 16px rgba(251,146,60,.1);animation:fadeIn .3s ease;
}
.alert-banner.visible{display:flex}
.alert-banner .alert-icon{
  flex-shrink:0;width:28px;height:28px;border-radius:8px;
  background:rgba(251,146,60,.2);display:flex;align-items:center;justify-content:center;
  color:var(--high);font-weight:700;
}
.alert-banner .alert-body{flex:1;line-height:1.5}
.alert-banner .alert-body strong{color:var(--high);font-weight:700;display:block;margin-bottom:.15rem}
.alert-banner .alert-close{
  background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.1rem;
  padding:0;line-height:1;flex-shrink:0;
}
.alert-banner .alert-close:hover{color:var(--text)}
</style>
</head>
<body>
<div class="app">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="logo">
      <span class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
      </span>
      <span class="logo-text">Security Guard</span>
    </div>
    <span class="version">v1.0</span>
    <span class="spacer"></span>
    <span class="status-pill"><span class="led"></span>System ready</span>
  </div>

  <div class="main">
    <!--
      Inline alert banner — replaces blocking native alert() dialogs.
      Driven by showAlert(message, title) / hideAlert() in JS below.
      Used for: scan errors, network failures, "no scanner selected", and
      especially for the PrivateRepoError surfaced by core/github_fetcher
      (which the JS auto-detects via regex on the error message).
    -->
    <div class="alert-banner" id="alertBanner">
      <div class="alert-icon">!</div>
      <div class="alert-body">
        <strong id="alertTitle">Warning</strong>
        <span id="alertMessage"></span>
      </div>
      <button class="alert-close" onclick="hideAlert()" title="Dismiss">&times;</button>
    </div>

    <!-- Scan Form -->
    <div class="scan-form fade-in">
      <h2>&#128269; New Scan</h2>

      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button class="mode-tab active" id="tab-local" onclick="setMode('local')">
          &#128193; Local Path
        </button>
        <button class="mode-tab" id="tab-github" onclick="setMode('github')">
          &#128025; GitHub Repo
        </button>
        <button class="mode-tab" id="tab-web" onclick="setMode('web')">
          &#127758; Website
        </button>
      </div>

      <!-- Main input -->
      <div class="input-row">
        <input type="text" id="pathInput" placeholder="Project path, e.g. C:\Users\you\project" spellcheck="false" autocomplete="off">
        <button class="btn btn-primary" id="scanBtn" onclick="startScan()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Scan
        </button>
      </div>

      <!-- GitHub token (shown only in github mode) -->
      <div class="token-row" id="tokenRow" style="display:none">
        <span class="token-label">&#128273; Token (optional, for private repos):</span>
        <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
      </div>

      <div class="scanner-toggles" id="scannerToggles"></div>
    </div>

    <!-- Progress -->
    <div class="progress-section" id="progressSection">
      <div class="progress-label">
        <span id="progressLabel" class="pulse">Initializing...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
      <!-- Score -->
      <div class="score-card fade-in" id="scoreCard">
        <div class="score-ring">
          <svg width="160" height="160" viewBox="0 0 160 160">
            <circle class="ring-bg" cx="80" cy="80" r="68"/>
            <circle class="ring-fill" id="scoreRing" cx="80" cy="80" r="68"
              stroke-dasharray="427.26" stroke-dashoffset="427.26"/>
          </svg>
          <div class="score-text" id="scoreText">--</div>
          <div class="score-grade" id="scoreGrade"></div>
        </div>
        <div class="score-meta">
          <span id="metaTarget"></span>
          <span id="metaBadge"></span>
          <span id="metaDate"></span>
          <span id="metaFindings"></span>
        </div>
      </div>

      <!-- Severity Cards -->
      <div class="severity-grid" id="severityGrid"></div>

      <!-- Two Columns -->
      <div class="two-col">
        <div class="panel" id="categoryPanel">
          <h3><span class="icon">&#128202;</span> OWASP Categories</h3>
          <div id="categoryBars"></div>
        </div>
        <div class="panel" id="scannerPanel">
          <h3><span class="icon">&#128270;</span> Scanner Results</h3>
          <div id="scannerCards"></div>
        </div>
      </div>

      <!-- Roadmap -->
      <div class="roadmap fade-in" id="roadmap">
        <h3>&#128679; Remediation Roadmap to 90%</h3>
        <div id="roadmapSteps"></div>
      </div>

      <!-- PDF Download Bar -->
      <div class="pdf-bar fade-in" id="pdfBar">
        <div class="pdf-info">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--critical)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span><strong>Export detailed PDF report</strong> &mdash; includes all findings, attack simulations, and remediation roadmap</span>
        </div>
        <div class="pdf-controls">
          <div class="lang-selector">
            <button class="lang-btn active" id="langEs" onclick="setLang('es',this)">ES</button>
            <button class="lang-btn" id="langEn" onclick="setLang('en',this)">EN</button>
          </div>
          <button class="btn-pdf" id="pdfBtn" onclick="downloadPDF()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download PDF
          </button>
        </div>
      </div>

      <!-- Findings -->
      <div class="findings-section fade-in">
        <div class="findings-header">
          <h3 id="findingsTitle">Findings</h3>
          <div style="display:flex;gap:.75rem;align-items:center;flex-wrap:wrap">
            <div class="filters" id="filters"></div>
            <input type="text" class="search-input" id="searchInput" placeholder="Search findings..." oninput="filterFindings()">
          </div>
        </div>
        <div class="finding-list" id="findingList"></div>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let allFindings = [];
let activeFilter = 'ALL';
let currentMode = 'local';  // 'local' | 'github' | 'web'

// ── Inline alert helpers (replace blocking alert() calls) ─
function showAlert(message, title) {
  const banner = document.getElementById('alertBanner');
  document.getElementById('alertTitle').textContent = title || 'Warning';
  document.getElementById('alertMessage').textContent = message;
  banner.classList.add('visible');
  banner.scrollIntoView({behavior:'smooth', block:'nearest'});
}
function hideAlert(){ document.getElementById('alertBanner').classList.remove('visible'); }

// ── Mode switching ────────────────────────────────
const MODE_CONFIG = {
  local:  { placeholder: 'Project path, e.g. C:\\Users\\you\\project', tab: 'tab-local',  activeClass: 'active',        showToken: false, showToggles: true  },
  github: { placeholder: 'https://github.com/owner/repo',              tab: 'tab-github', activeClass: 'active-github', showToken: true,  showToggles: true  },
  web:    { placeholder: 'https://example.com',                         tab: 'tab-web',    activeClass: 'active-web',    showToken: false, showToggles: false },
};

function setMode(mode) {
  currentMode = mode;
  const cfg = MODE_CONFIG[mode];

  // Update tabs
  ['local','github','web'].forEach(m => {
    const tab = document.getElementById('tab-' + m);
    tab.className = 'mode-tab' + (m === mode ? ' ' + MODE_CONFIG[m].activeClass : '');
  });

  // Update input placeholder
  document.getElementById('pathInput').placeholder = cfg.placeholder;

  // Show/hide token field
  document.getElementById('tokenRow').style.display = cfg.showToken ? 'flex' : 'none';

  // Show/hide scanner toggles
  const toggles = document.getElementById('scannerToggles');
  toggles.classList.toggle('scanners-hidden', !cfg.showToggles);
}

// ── Init ──────────────────────────────────────────
async function init() {
  const res = await fetch(API + '/api/scanners');
  const scanners = await res.json();
  const container = document.getElementById('scannerToggles');
  scanners.forEach(s => {
    const el = document.createElement('div');
    el.className = 'scanner-toggle active';
    el.dataset.key = s.key;
    el.innerHTML = `<span class="dot"></span>${s.name}`;
    el.onclick = () => el.classList.toggle('active');
    container.appendChild(el);
  });
}
init();

// ── Scan ──────────────────────────────────────────
async function startScan() {
  const path = document.getElementById('pathInput').value.trim();
  if (!path) { document.getElementById('pathInput').focus(); return; }

  const body = { path };

  // For web mode, no scanner keys needed (server picks automatically)
  if (currentMode !== 'web') {
    const toggles = document.querySelectorAll('.scanner-toggle.active');
    const scanners = Array.from(toggles).map(t => t.dataset.key);
    if (!scanners.length) { showAlert('Select at least one scanner to run.', 'No scanners selected'); return; }
    body.scanners = scanners;
  }
  hideAlert();

  // Include GitHub token if provided
  if (currentMode === 'github') {
    const token = document.getElementById('tokenInput').value.trim();
    if (token) body.github_token = token;
  }

  document.getElementById('scanBtn').disabled = true;
  document.getElementById('dashboard').classList.remove('visible');
  document.getElementById('progressSection').classList.add('visible');

  try {
    const res = await fetch(API + '/api/scan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json();
      showAlert(err.error || 'Error starting scan', 'Scan failed to start');
      resetUI();
      return;
    }
    pollStatus();
  } catch(e) {
    showAlert('Connection error: ' + e.message, 'Network error');
    resetUI();
  }
}

function resetUI() {
  document.getElementById('scanBtn').disabled = false;
  document.getElementById('progressSection').classList.remove('visible');
}

async function pollStatus() {
  const res = await fetch(API + '/api/status');
  const s = await res.json();

  document.getElementById('progressBar').style.width = s.progress + '%';
  document.getElementById('progressPct').textContent = s.progress + '%';
  document.getElementById('progressLabel').textContent = s.running ? `${s.current_scanner}...` : 'Complete';

  if (s.error) {
    // Detect private-repo / auth warnings and show with specific title
    const isPrivate = /private|token|PAT|401|403|404/i.test(s.error);
    showAlert(s.error, isPrivate ? 'Private repository detected' : 'Scan error');
    resetUI();
    return;
  }

  if (s.running) {
    setTimeout(pollStatus, 400);
  } else if (s.has_results) {
    document.getElementById('progressLabel').classList.remove('pulse');
    setTimeout(loadResults, 300);
  }
}

// ── Results ───────────────────────────────────────
async function loadResults() {
  const res = await fetch(API + '/api/results');
  const data = await res.json();
  allFindings = data.findings;

  resetUI();
  document.getElementById('progressSection').classList.remove('visible');
  document.getElementById('dashboard').classList.add('visible');

  renderScore(data);
  renderSeverity(data);
  renderCategories(data);
  renderScanners(data);
  renderRoadmap(data);
  renderFilters(data);
  renderFindings(allFindings);
  document.getElementById('pdfBar').classList.add('visible');
}

// ── Score Ring ─────────────────────────────────────
function renderScore(data) {
  const ring = document.getElementById('scoreRing');
  const circumference = 2 * Math.PI * 68;
  const offset = circumference - (data.score / 100) * circumference;

  const color = data.score >= 90 ? 'var(--green)' : data.score >= 70 ? 'var(--medium)' : data.score >= 50 ? 'var(--high)' : 'var(--critical)';
  ring.style.stroke = color;
  setTimeout(() => ring.style.strokeDashoffset = offset, 100);

  document.getElementById('scoreText').textContent = data.score;
  document.getElementById('scoreText').style.color = color;
  document.getElementById('scoreGrade').textContent = `Grade ${data.grade}`;

  // Target label — shorten display
  const t = data.target || '';
  const shortTarget = t.length > 50 ? t.slice(0, 47) + '…' : t;
  document.getElementById('metaTarget').textContent = `Target: ${shortTarget}`;

  // Scan type badge
  const typeMap = {
    local:  { label: '📁 Local',  cls: 'badge-local'  },
    github: { label: '🐙 GitHub', cls: 'badge-github' },
    web:    { label: '🌐 Web',    cls: 'badge-web'    },
  };
  const badge = typeMap[data.scan_type] || typeMap.local;
  document.getElementById('metaBadge').innerHTML =
    `<span class="scan-type-badge ${badge.cls}">${badge.label}</span>`;

  document.getElementById('metaDate').textContent = data.date;
  document.getElementById('metaFindings').textContent = `${data.total_findings} findings`;
}

// ── Severity Cards ────────────────────────────────
function renderSeverity(data) {
  const grid = document.getElementById('severityGrid');
  const sevs = ['CRITICAL','HIGH','MEDIUM','LOW','INFO'];
  grid.innerHTML = sevs.map(s => `
    <div class="sev-card sev-${s.toLowerCase()}">
      <div class="count">${data.severity_counts[s]}</div>
      <div class="label">${s}</div>
    </div>
  `).join('');
}

// ── Categories ────────────────────────────────────
function renderCategories(data) {
  const container = document.getElementById('categoryBars');
  const cats = Object.entries(data.category_counts);
  const max = cats.length ? Math.max(...cats.map(c=>c[1])) : 1;
  container.innerHTML = cats.map(([name, count]) => `
    <div class="cat-bar">
      <span class="cat-name" title="${esc(name)}">${esc(name)}</span>
      <div class="cat-track"><div class="cat-fill" style="width:${(count/max)*100}%"></div></div>
      <span class="cat-count">${count}</span>
    </div>
  `).join('');
}

// ── Scanners ──────────────────────────────────────
function renderScanners(data) {
  const container = document.getElementById('scannerCards');
  container.innerHTML = data.scanners.map(s => `
    <div class="scanner-card">
      <div class="scanner-icon ${s.findings_count ? 'warn' : 'clean'}">${s.findings_count ? '&#9888;' : '&#10003;'}</div>
      <div class="scanner-info">
        <div class="sname">${esc(s.name)}</div>
        <div class="sdesc">${s.files_scanned} files &middot; ${esc(s.description)}</div>
      </div>
      <div class="scanner-stats">
        <div class="scount">${s.findings_count}</div>
        <div class="stime">${s.time}s</div>
      </div>
    </div>
  `).join('');
}

// ── Roadmap ───────────────────────────────────────
function renderRoadmap(data) {
  const container = document.getElementById('roadmapSteps');
  const sc = data.severity_counts;

  if (data.score >= 90) {
    container.innerHTML = `<div class="roadmap-step"><div class="step-circle ok">&#10003;</div><div class="step-content"><strong>Your project meets the 90% security target!</strong><p>Continue monitoring for new vulnerabilities and keep dependencies updated.</p></div></div>`;
    return;
  }

  let steps = [], n = 1;
  if (sc.CRITICAL) steps.push(`<div class="roadmap-step"><div class="step-circle crit">${n++}</div><div class="step-content"><strong>Fix ${sc.CRITICAL} CRITICAL vulnerabilities</strong><p>Actively exploitable issues. Each fix recovers ~15 points. Fix these immediately.</p></div></div>`);
  if (sc.HIGH) steps.push(`<div class="roadmap-step"><div class="step-circle high">${n++}</div><div class="step-content"><strong>Fix ${sc.HIGH} HIGH severity issues</strong><p>Significant security risks. Each fix recovers ~8 points. Plan for next sprint.</p></div></div>`);
  if (sc.MEDIUM) steps.push(`<div class="roadmap-step"><div class="step-circle med">${n++}</div><div class="step-content"><strong>Address ${sc.MEDIUM} MEDIUM findings</strong><p>Best-practice improvements. Each fix recovers ~4 points.</p></div></div>`);
  steps.push(`<div class="roadmap-step"><div class="step-circle ok">${n}</div><div class="step-content"><strong>Implement preventive measures</strong><p>Add CI/CD security scanning, pre-commit hooks, dependency auditing, and regular pen testing.</p></div></div>`);
  container.innerHTML = steps.join('');
}

// ── Filters ───────────────────────────────────────
function renderFilters(data) {
  const container = document.getElementById('filters');
  const sevs = ['ALL','CRITICAL','HIGH','MEDIUM','LOW','INFO'];
  container.innerHTML = sevs.map(s => {
    const count = s === 'ALL' ? data.total_findings : data.severity_counts[s];
    return `<button class="filter-btn ${s === 'ALL' ? 'active' : ''}" onclick="setFilter('${s}',this)">${s}<span class="fcount">${count}</span></button>`;
  }).join('');
  document.getElementById('findingsTitle').textContent = `Findings (${data.total_findings})`;
}

function setFilter(sev, el) {
  activeFilter = sev;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filterFindings();
}

function filterFindings() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let filtered = allFindings;
  if (activeFilter !== 'ALL') filtered = filtered.filter(f => f.severity === activeFilter);
  if (q) filtered = filtered.filter(f =>
    f.title.toLowerCase().includes(q) ||
    f.file_path.toLowerCase().includes(q) ||
    f.description.toLowerCase().includes(q) ||
    (f.category && f.category.toLowerCase().includes(q))
  );
  renderFindings(filtered);
}

// ── Findings List ─────────────────────────────────
function renderFindings(findings) {
  const container = document.getElementById('findingList');
  if (!findings.length) {
    container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text3)">No findings match your filters</div>';
    return;
  }

  container.innerHTML = findings.map((f, i) => `
    <div class="finding-item" id="fi-${i}">
      <div class="finding-item-header" onclick="document.getElementById('fi-${i}').classList.toggle('open')">
        <span class="sev-badge b-${f.severity.toLowerCase()}">${f.severity}</span>
        <span class="finding-title">${esc(f.title)}</span>
        <span class="finding-file">${esc(f.file_path)}${f.line_number ? ':'+f.line_number : ''}</span>
        <span class="chevron">&#9654;</span>
      </div>
      <div class="finding-body">
        <div class="f-meta">
          <span class="f-tag">${esc(f.category)}</span>
          ${f.cwe_id ? `<span class="f-tag">${esc(f.cwe_id)}</span>` : ''}
        </div>
        <div class="f-section">
          <div class="f-section-title">Code</div>
          <div class="f-code">${esc(f.code_snippet)}</div>
        </div>
        <div class="f-section">
          <div class="f-section-title">&#128269; Description</div>
          <div class="f-desc">${esc(f.description)}</div>
        </div>
        ${f.root_cause ? `
        <div class="f-section f-section-root">
          <div class="f-section-title">&#128270; Root Cause</div>
          <div class="f-root-cause">${esc(f.root_cause)}</div>
        </div>` : ''}
        ${f.consequences ? `
        <div class="f-section f-section-conseq">
          <div class="f-section-title">&#9889; Consequences</div>
          <div class="f-consequences">${esc(f.consequences)}</div>
        </div>` : ''}
        ${f.attack_simulation ? `
        <div class="f-section">
          <div class="f-section-title">&#9888;&#65039; Attack Simulation</div>
          <div class="f-attack">${esc(f.attack_simulation)}</div>
        </div>` : ''}
        <div class="f-section">
          <div class="f-section-title">&#9989; Recommendation</div>
          <div class="f-rec">${esc(f.recommendation)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

// ── Utils ─────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── PDF Export ────────────────────────────────────
let selectedLang = 'es';

function setLang(lang, el) {
  selectedLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

async function downloadPDF() {
  const btn = document.getElementById('pdfBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';

  try {
    const res = await fetch(API + `/api/export/pdf?lang=${selectedLang}`);
    if (!res.ok) {
      const err = await res.json();
      showAlert(err.error || 'Unknown error', 'PDF generation failed');
      return;
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const cd = res.headers.get('Content-Disposition') || '';
    const match = cd.match(/filename="?([^"]+)"?/);
    a.download = match ? match[1] : `security_report_${selectedLang}.pdf`;
    a.href = url;
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) {
    showAlert('Connection error: ' + e.message, 'Network error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PDF';
  }
}

// ── Enter to scan ─────────────────────────────────
document.getElementById('pathInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startScan();
});
document.getElementById('tokenInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startScan();
});

// ── Auto-detect mode from pasted URL ──────────────
document.getElementById('pathInput').addEventListener('input', e => {
  const val = e.target.value.trim().toLowerCase();
  if (val.includes('github.com/')) {
    setMode('github');
  } else if (val.startsWith('http://') || val.startsWith('https://')) {
    setMode('web');
  }
});
</script>
